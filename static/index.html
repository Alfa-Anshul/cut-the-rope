<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cut The Rope</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --orange:#FF6B35;--orange2:#ff4500;--yellow:#FFD700;--green:#4ade80;--green2:#22c55e;
  --bg:#0f0c1d;--card:#1e1535;--card2:#2a1d4a;--card3:#341f5c;
  --text:#fff;--muted:#8b7fa8;--border:rgba(255,255,255,0.08);
  --glow-orange:rgba(255,107,53,0.4);--glow-green:rgba(74,222,128,0.4);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* === ANIMATED BG === */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(100,40,200,0.18) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 90%,rgba(255,107,53,0.12) 0%,transparent 60%),
             radial-gradient(ellipse 50% 40% at 50% 50%,rgba(30,21,53,0.9) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}

#app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;height:100vh}

/* === SCREENS === */
.screen{display:none;width:100%;max-width:420px;height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.screen.active{display:flex}

/* ===================== AUTH SCREEN ===================== */
#authScreen{justify-content:center;gap:0}

.auth-brand{text-align:center;margin-bottom:32px}
.brand-icon{font-size:3.5rem;display:block;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(255,107,53,0.8));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.brand-title{font-family:'Fredoka One',cursive;font-size:2.6rem;background:linear-gradient(135deg,#FF6B35 0%,#FFD700 50%,#4ade80 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.brand-sub{font-size:.88rem;color:var(--muted);margin-top:6px;font-weight:600;letter-spacing:.5px}

.auth-card{
  width:100%;background:var(--card);
  border:1px solid var(--border);border-radius:28px;
  padding:28px 26px 24px;
  box-shadow:0 24px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04),inset 0 1px 0 rgba(255,255,255,0.08);
  position:relative;overflow:hidden;
}
.auth-card::before{
  content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(255,107,53,0.12) 0%,transparent 70%);
  pointer-events:none;
}

.tab-row{display:flex;background:rgba(0,0,0,0.3);border-radius:14px;padding:4px;margin-bottom:22px;gap:4px}
.tab-btn{flex:1;padding:9px 0;border:none;background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;border-radius:10px;transition:all .25s}
.tab-btn.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 4px 16px rgba(255,107,53,0.4)}

.input-wrap{position:relative;margin-bottom:14px}
.input-wrap label{display:block;font-size:.78rem;font-weight:800;color:var(--muted);margin-bottom:6px;letter-spacing:.6px;text-transform:uppercase}
.input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none;margin-top:10px}
.input-wrap input{
  width:100%;padding:13px 16px 13px 42px;
  border-radius:14px;border:1.5px solid rgba(255,255,255,0.08);
  background:rgba(0,0,0,0.3);color:#fff;
  font-size:.98rem;font-family:'Nunito',sans-serif;font-weight:600;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.input-wrap input::placeholder{color:rgba(255,255,255,0.2)}
.input-wrap input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,53,0.15)}

.btn-auth{
  width:100%;padding:15px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--orange) 0%,#e04800 100%);
  color:#fff;font-size:1.08rem;font-weight:900;font-family:'Nunito',sans-serif;
  cursor:pointer;margin-top:6px;letter-spacing:.3px;
  box-shadow:0 8px 24px rgba(255,107,53,0.45),0 2px 0 rgba(255,255,255,0.1) inset;
  transition:transform .15s,box-shadow .2s;position:relative;overflow:hidden;
}
.btn-auth:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,107,53,0.55)}
.btn-auth:active{transform:translateY(1px)}
.btn-auth::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transition:left .4s}
.btn-auth:hover::after{left:150%}

.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:.8rem;font-weight:700}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}

.social-hint{text-align:center;color:var(--muted);font-size:.82rem;font-weight:600}
.social-hint span{color:var(--orange);cursor:pointer}

.err-msg{min-height:20px;color:#ff6b6b;font-size:.84rem;text-align:center;margin-top:10px;font-weight:700}

/* ===================== MENU SCREEN ===================== */
#menuScreen{gap:0;justify-content:flex-start;padding-top:40px}

.menu-logo{font-family:'Fredoka One',cursive;font-size:2.8rem;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#FF6B35,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.menu-tagline{text-align:center;color:var(--muted);font-size:.88rem;font-weight:600;margin-bottom:28px}

.user-card{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.user-avatar{
  width:48px;height:48px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--orange),var(--yellow));
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;
  box-shadow:0 4px 16px rgba(255,107,53,0.4);
}
.user-info .uname{font-weight:900;font-size:1.02rem}
.user-info .ustat{font-size:.8rem;color:var(--muted);font-weight:600;margin-top:2px}
.user-badge{margin-left:auto;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;font-size:.72rem;font-weight:900;padding:4px 10px;border-radius:20px;letter-spacing:.4px}

.menu-actions{display:flex;flex-direction:column;gap:12px;width:100%}

.btn-big{
  width:100%;padding:18px 22px;border-radius:18px;border:none;
  font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:900;
  cursor:pointer;display:flex;align-items:center;gap:14px;
  transition:transform .15s,box-shadow .2s;position:relative;overflow:hidden;
}
.btn-big:hover{transform:translateY(-3px)}
.btn-big:active{transform:translateY(0)}
.btn-big .bi{font-size:1.6rem;flex-shrink:0}
.btn-big .bt{display:flex;flex-direction:column;text-align:left}
.btn-big .bt b{font-size:1.05rem}
.btn-big .bt small{font-size:.75rem;opacity:.75;font-weight:600}

.btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 8px 28px rgba(34,197,94,0.4)}
.btn-lb{background:linear-gradient(135deg,#eab308,#ca8a04);color:#111;box-shadow:0 8px 28px rgba(234,179,8,0.35)}
.btn-logout{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.btn-logout:hover{background:var(--card3)}
.btn-big .arrow{margin-left:auto;opacity:.5;font-size:1.1rem}

/* ===================== LEVEL SELECT ===================== */
#levelScreen{justify-content:flex-start;padding-top:20px;gap:0}
.ls-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;width:100%}
.btn-back{background:var(--card);border:1px solid var(--border);color:#fff;border-radius:12px;padding:10px 14px;cursor:pointer;font-size:1rem;transition:background .2s;flex-shrink:0}
.btn-back:hover{background:var(--card2)}
.ls-title{font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--text)}
.levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.level-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:20px;
  padding:20px 10px 14px;display:flex;flex-direction:column;align-items:center;
  cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;
  position:relative;overflow:hidden;
}
.level-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(255,107,53,0.6),transparent);opacity:0;transition:opacity .2s}
.level-card:hover{transform:translateY(-5px);box-shadow:0 16px 40px rgba(0,0,0,0.4);border-color:rgba(255,107,53,0.4)}
.level-card:hover::before{opacity:1}
.level-card.completed{border-color:rgba(74,222,128,0.4);background:linear-gradient(135deg,var(--card),rgba(74,222,128,0.05))}
.level-card.locked{opacity:.4;cursor:not-allowed;pointer-events:none}
.level-num{font-family:'Fredoka One',cursive;font-size:2.1rem;color:var(--orange);line-height:1}
.level-label{font-size:.65rem;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.level-stars{display:flex;gap:3px;margin-top:8px}
.lstar{font-size:.95rem;color:rgba(255,255,255,0.15)}
.lstar.lit{color:var(--yellow);filter:drop-shadow(0 0 4px rgba(255,215,0,0.6))}

/* ===================== GAME SCREEN ===================== */
#gameScreen{padding:0;background:#0a0818;position:relative;justify-content:flex-start}
.game-hud{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:rgba(10,8,24,0.85);
  backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);
  flex-shrink:0;z-index:10;
}
.hud-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:10px;padding:7px 13px;cursor:pointer;font-size:.9rem;font-family:'Nunito',sans-serif;font-weight:800;transition:background .2s}
.hud-btn:hover{background:rgba(255,255,255,0.15)}
.hud-center{text-align:center}
.hud-level{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--orange);line-height:1}
.hud-ropes{font-size:.75rem;color:var(--muted);font-weight:700;margin-top:1px}
.hud-score{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--yellow);min-width:60px;text-align:right;text-shadow:0 0 12px rgba(255,215,0,0.5)}
#gameCanvas{display:block;touch-action:none;flex:1;width:100%}

.game-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(10,8,24,0.88);backdrop-filter:blur(12px);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;padding:28px;z-index:20;
}
.game-overlay.show{display:flex}
.ov-title{font-family:'Fredoka One',cursive;font-size:2.8rem;text-align:center;text-shadow:0 4px 20px rgba(0,0,0,0.5)}
.ov-stars{display:flex;gap:10px;font-size:2.8rem;filter:drop-shadow(0 0 8px rgba(255,215,0,0.6))}
.ov-score{font-size:1.1rem;color:var(--muted);font-weight:700}
.ov-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.btn-sm{padding:13px 26px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;transition:transform .15s,box-shadow .2s}
.btn-sm:hover{transform:translateY(-2px)}
.btn-retry{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;box-shadow:0 6px 20px rgba(255,107,53,0.4)}
.btn-next{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;box-shadow:0 6px 20px rgba(74,222,128,0.4)}
.btn-levels2{background:var(--card2);color:var(--muted);border:1px solid var(--border)}

/* ===================== LEADERBOARD ===================== */
#lbScreen{justify-content:flex-start;padding-top:20px;gap:0}
.lb-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;width:100%}
.lb-title{font-family:'Fredoka One',cursive;font-size:1.7rem}
.lb-list{width:100%;display:flex;flex-direction:column;gap:8px}
.lb-row{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  transition:transform .15s;
}
.lb-row:hover{transform:translateX(4px)}
.lb-row.top1{background:linear-gradient(135deg,rgba(255,215,0,0.12),var(--card));border-color:rgba(255,215,0,0.3)}
.lb-row.top2{background:linear-gradient(135deg,rgba(192,192,192,0.1),var(--card));border-color:rgba(192,192,192,0.2)}
.lb-row.top3{background:linear-gradient(135deg,rgba(205,127,50,0.1),var(--card));border-color:rgba(205,127,50,0.2)}
.lb-rank{font-family:'Fredoka One',cursive;font-size:1.3rem;width:36px;text-align:center}
.lb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--card2),var(--card3));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.9rem}
.lb-name{flex:1;font-weight:800;font-size:.95rem}
.lb-right{text-align:right}
.lb-sc{color:var(--yellow);font-weight:900;font-size:.95rem}
.lb-st{font-size:.75rem;color:var(--muted);font-weight:700}
.lb-empty{text-align:center;color:var(--muted);padding:50px 20px;font-weight:700}

/* ===================== TOAST ===================== */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,var(--card2),var(--card3));color:#fff;
  padding:12px 28px;border-radius:50px;font-weight:800;font-size:.9rem;
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  z-index:999;border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.4);white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===================== PARTICLES ===================== */
.particle{position:fixed;pointer-events:none;font-size:1.2rem;z-index:100;animation:particle-fly 1.2s ease-out forwards}
@keyframes particle-fly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3)}}
</style>
</head>
<body>
<div id="app">

  <!-- AUTH -->
  <div class="screen active" id="authScreen">
    <div class="auth-brand">
      <span class="brand-icon">🪢</span>
      <div class="brand-title">Cut The Rope</div>
      <div class="brand-sub">✂️ Slice · ⭐ Collect · 🐊 Feed Om Nom</div>
    </div>
    <div class="auth-card">
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')" id="tabLogin">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')" id="tabReg">Register</button>
      </div>
      <div id="loginForm">
        <div class="input-wrap"><label>Username</label><span class="icon">👤</span><input type="text" id="loginUser" placeholder="Enter username" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="input-wrap"><label>Password</label><span class="icon">🔒</span><input type="password" id="loginPass" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn-auth" onclick="doLogin()">Sign In & Play 🎮</button>
      </div>
      <div id="registerForm" style="display:none">
        <div class="input-wrap"><label>Username</label><span class="icon">👤</span><input type="text" id="regUser" placeholder="Choose a username"></div>
        <div class="input-wrap"><label>Email</label><span class="icon">📧</span><input type="email" id="regEmail" placeholder="your@email.com"></div>
        <div class="input-wrap"><label>Password</label><span class="icon">🔒</span><input type="password" id="regPass" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')doRegister()"></div>
        <button class="btn-auth" onclick="doRegister()">Create Account 🚀</button>
      </div>
      <div class="err-msg" id="authError"></div>
    </div>
  </div>

  <!-- MENU -->
  <div class="screen" id="menuScreen">
    <div class="menu-logo">🪢 Cut The Rope</div>
    <div class="menu-tagline">Feed the candy to Om Nom!</div>
    <div class="user-card">
      <div class="user-avatar" id="menuAvatar">A</div>
      <div class="user-info">
        <div class="uname" id="menuName">Player</div>
        <div class="ustat" id="menuStat">Loading...</div>
      </div>
      <div class="user-badge">PLAYER</div>
    </div>
    <div class="menu-actions">
      <button class="btn-big btn-play" onclick="showScreen('levelScreen')">
        <span class="bi">🎮</span>
        <div class="bt"><b>Play Game</b><small>8 levels of fun</small></div>
        <span class="arrow">›</span>
      </button>
      <button class="btn-big btn-lb" onclick="showLeaderboard()">
        <span class="bi">🏆</span>
        <div class="bt"><b>Leaderboard</b><small>Top players worldwide</small></div>
        <span class="arrow">›</span>
      </button>
      <button class="btn-big btn-logout" onclick="logout()">
        <span class="bi">🚪</span>
        <div class="bt"><b>Sign Out</b><small>See you next time!</small></div>
      </button>
    </div>
  </div>

  <!-- LEVEL SELECT -->
  <div class="screen" id="levelScreen">
    <div class="ls-header">
      <button class="btn-back" onclick="showScreen('menuScreen')">◀</button>
      <div class="ls-title">🗺️ Select Level</div>
    </div>
    <div class="levels-grid" id="levelsGrid"></div>
  </div>

  <!-- GAME -->
  <div class="screen" id="gameScreen">
    <div class="game-hud">
      <button class="hud-btn" onclick="quitGame()">◀ Exit</button>
      <div class="hud-center">
        <div class="hud-level" id="hudLevel">Level 1</div>
        <div class="hud-ropes" id="hudRopes">✂️ Ropes: 1</div>
      </div>
      <div class="hud-score" id="hudScore">0</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="game-overlay" id="gameOverlay">
      <div class="ov-title" id="overlayTitle">Level Complete!</div>
      <div class="ov-stars" id="overlayStars"></div>
      <div class="ov-score" id="overlayScore"></div>
      <div class="ov-btns">
        <button class="btn-sm btn-retry" onclick="retryLevel()">🔄 Retry</button>
        <button class="btn-sm btn-next" id="btnNext" onclick="nextLevel()">▶ Next</button>
        <button class="btn-sm btn-levels2" onclick="quitGame()">🗺️ Levels</button>
      </div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="screen" id="lbScreen">
    <div class="lb-header">
      <button class="btn-back" onclick="showScreen('menuScreen')">◀</button>
      <div class="lb-title">🏆 Leaderboard</div>
    </div>
    <div class="lb-list" id="lbList"></div>
  </div>

</div>
<div id="toast"></div>
<script src="game.js"></script>
</body>
</html>
