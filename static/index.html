<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cut The Rope</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  :root{--green:#4CAF50;--orange:#FF6B35;--yellow:#FFD700;--bg:#1a0a2e;--card:#2d1b4e;--card2:#3d2666;--text:#fff;--star:#FFD700;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  #app{display:flex;flex-direction:column;align-items:center;min-height:100vh}
  .screen{display:none;width:100%;max-width:480px;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  .screen.active{display:flex}
  .auth-box{background:var(--card);border-radius:24px;padding:36px 32px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
  .auth-logo{font-family:'Fredoka One',cursive;font-size:2.8rem;text-align:center;margin-bottom:8px;background:linear-gradient(135deg,#FF6B35,#FFD700,#4CAF50);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .auth-sub{text-align:center;color:#aaa;margin-bottom:28px;font-size:.95rem}
  .tab-row{display:flex;margin-bottom:24px;border-radius:12px;overflow:hidden;background:#1a0a2e}
  .tab-btn{flex:1;padding:10px;border:none;background:transparent;color:#aaa;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
  .tab-btn.active{background:var(--orange);color:#fff}
  .input-group{margin-bottom:16px}
  .input-group label{display:block;font-size:.85rem;color:#aaa;margin-bottom:6px;font-weight:600}
  .input-group input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #3d2666;background:#1a0a2e;color:#fff;font-size:1rem;font-family:'Nunito',sans-serif;transition:border-color .2s;outline:none}
  .input-group input:focus{border-color:var(--orange)}
  .btn-primary{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--orange),#e55a2b);color:#fff;font-size:1.1rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:transform .1s,box-shadow .2s;box-shadow:0 4px 20px rgba(255,107,53,.4)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,107,53,.6)}
  .error-msg{color:#ff6b6b;font-size:.88rem;text-align:center;margin-top:10px;min-height:20px}
  .menu-header{text-align:center;margin-bottom:32px}
  .menu-title{font-family:'Fredoka One',cursive;font-size:3rem;background:linear-gradient(135deg,#FF6B35,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .menu-sub{color:#aaa;margin-top:4px}
  .menu-user{background:var(--card);border-radius:16px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:24px;width:100%}
  .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--yellow));display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff}
  .user-info .name{font-weight:800;font-size:1rem}
  .user-info .stat{font-size:.8rem;color:#aaa}
  .menu-btns{display:flex;flex-direction:column;gap:12px;width:100%}
  .btn-menu{padding:16px 24px;border-radius:16px;border:none;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:12px;transition:transform .15s,box-shadow .2s}
  .btn-play{background:linear-gradient(135deg,#4CAF50,#2e7d32);color:#fff;box-shadow:0 4px 20px rgba(76,175,80,.4)}
  .btn-leaderboard{background:linear-gradient(135deg,#FFD700,#e6ac00);color:#1a0a2e;box-shadow:0 4px 20px rgba(255,215,0,.3)}
  .btn-logout{background:var(--card2);color:#aaa}
  .btn-menu:hover{transform:translateY(-2px)}
  .btn-menu span.icon{font-size:1.4rem}
  .ls-header{display:flex;align-items:center;gap:12px;margin-bottom:28px;width:100%}
  .btn-back{background:var(--card);border:none;color:#fff;border-radius:12px;padding:10px 14px;cursor:pointer;font-size:1.1rem;transition:background .2s}
  .btn-back:hover{background:var(--card2)}
  .ls-title{font-family:'Fredoka One',cursive;font-size:1.8rem}
  .levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%}
  .level-card{background:var(--card);border-radius:18px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid transparent}
  .level-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .level-card.locked{opacity:.45;cursor:not-allowed;pointer-events:none}
  .level-card.completed{border-color:var(--green)}
  .level-num{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--orange)}
  .level-stars{display:flex;gap:2px;margin-top:4px}
  .star{font-size:1rem;color:#333}
  .star.lit{color:var(--star)}
  #gameScreen{background:#0d0d1a;position:relative;padding:0;justify-content:flex-start}
  #gameCanvas{display:block;touch-action:none;width:100%;}
  .game-hud{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(0,0,0,.5);z-index:10}
  .hud-btn{background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:.95rem;font-family:'Nunito',sans-serif;font-weight:700}
  .hud-btn:hover{background:rgba(255,255,255,.2)}
  .hud-level{font-family:'Fredoka One',cursive;font-size:1.3rem;color:var(--orange)}
  .hud-score{font-weight:800;color:var(--yellow)}
  .hud-ropes{font-size:.85rem;color:#aaa;text-align:right}
  .game-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;z-index:20}
  .game-overlay.show{display:flex}
  .overlay-title{font-family:'Fredoka One',cursive;font-size:2.5rem;text-align:center}
  .overlay-stars{display:flex;gap:8px;font-size:2.5rem}
  .overlay-score{font-size:1.1rem;color:#aaa}
  .overlay-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .btn-small{padding:12px 24px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .15s}
  .btn-small:hover{transform:translateY(-2px)}
  .btn-retry{background:var(--orange);color:#fff}
  .btn-next{background:var(--green);color:#fff}
  .btn-levels{background:var(--card2);color:#fff}
  .lb-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;width:100%}
  .lb-title{font-family:'Fredoka One',cursive;font-size:1.8rem}
  .lb-table{width:100%;background:var(--card);border-radius:18px;overflow:hidden}
  .lb-row{display:flex;align-items:center;padding:14px 18px;gap:14px;border-bottom:1px solid rgba(255,255,255,.05)}
  .lb-row:last-child{border-bottom:none}
  .lb-rank{font-family:'Fredoka One',cursive;font-size:1.4rem;width:36px;text-align:center}
  .lb-rank.gold{color:#FFD700}.lb-rank.silver{color:#C0C0C0}.lb-rank.bronze{color:#CD7F32}
  .lb-name{flex:1;font-weight:700}
  .lb-score{color:var(--yellow);font-weight:800}
  .lb-stars{color:var(--star)}
  .lb-empty{text-align:center;color:#aaa;padding:40px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card2);color:#fff;padding:12px 24px;border-radius:14px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-size:.95rem}
  #toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="authScreen">
    <div class="auth-box">
      <div class="auth-logo">🪢 Cut The Rope</div>
      <div class="auth-sub">Feed Om Nom! Cut the ropes to drop the candy.</div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>
      <div id="loginForm">
        <div class="input-group"><label>Username</label><input type="text" id="loginUser" placeholder="Your username" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div class="input-group"><label>Password</label><input type="password" id="loginPass" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <button class="btn-primary" onclick="doLogin()">Login 🎮</button>
      </div>
      <div id="registerForm" style="display:none">
        <div class="input-group"><label>Username</label><input type="text" id="regUser" placeholder="Choose username"></div>
        <div class="input-group"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
        <div class="input-group"><label>Password</label><input type="password" id="regPass" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')doRegister()"></div>
        <button class="btn-primary" onclick="doRegister()">Create Account 🚀</button>
      </div>
      <div class="error-msg" id="authError"></div>
    </div>
  </div>

  <div class="screen" id="menuScreen">
    <div class="menu-header">
      <div class="menu-title">🪢 Cut The Rope</div>
      <div class="menu-sub">Feed the candy to Om Nom!</div>
    </div>
    <div class="menu-user">
      <div class="avatar" id="menuAvatar">A</div>
      <div class="user-info"><div class="name" id="menuName">Player</div><div class="stat" id="menuStat">Loading...</div></div>
    </div>
    <div class="menu-btns">
      <button class="btn-menu btn-play" onclick="showScreen('levelScreen')"><span class="icon">🎮</span> Play Game</button>
      <button class="btn-menu btn-leaderboard" onclick="showLeaderboard()"><span class="icon">🏆</span> Leaderboard</button>
      <button class="btn-menu btn-logout" onclick="logout()"><span class="icon">🚪</span> Logout</button>
    </div>
  </div>

  <div class="screen" id="levelScreen">
    <div class="ls-header">
      <button class="btn-back" onclick="showScreen('menuScreen')">◀</button>
      <div class="ls-title">🗺️ Select Level</div>
    </div>
    <div class="levels-grid" id="levelsGrid"></div>
  </div>

  <div class="screen" id="gameScreen">
    <div class="game-hud">
      <button class="hud-btn" onclick="quitGame()">◀ Menu</button>
      <div style="text-align:center"><div class="hud-level" id="hudLevel">Level 1</div><div class="hud-ropes" id="hudRopes">Ropes: 3</div></div>
      <div class="hud-score" id="hudScore">0</div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="game-overlay" id="gameOverlay">
      <div class="overlay-title" id="overlayTitle">Level Complete!</div>
      <div class="overlay-stars" id="overlayStars"></div>
      <div class="overlay-score" id="overlayScore"></div>
      <div class="overlay-btns">
        <button class="btn-small btn-retry" onclick="retryLevel()">🔄 Retry</button>
        <button class="btn-small btn-next" id="btnNext" onclick="nextLevel()">▶ Next</button>
        <button class="btn-small btn-levels" onclick="quitGame()">🗺️ Levels</button>
      </div>
    </div>
  </div>

  <div class="screen" id="lbScreen">
    <div class="lb-header">
      <button class="btn-back" onclick="showScreen('menuScreen')">◀</button>
      <div class="lb-title">🏆 Leaderboard</div>
    </div>
    <div class="lb-table" id="lbTable"></div>
  </div>
</div>
<div id="toast"></div>
<script src="game.js"></script>
</body>
</html>
